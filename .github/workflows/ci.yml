name: CI

on:
  push:
    branches: [ main, feature-cpf ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Rodar testes unitários
      run: python -m unittest discover -v